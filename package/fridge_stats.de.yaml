# fridge-stats package — state + statistics layer for the Fridge Door Monitor blueprint.
# Deliberately source-agnostic: NO reference to any physical sensor lives here.
# All sensor wiring happens in the blueprint automation instance (fully configurable).
# Repo: ~/Projekte/homeassistant/fridge-stats (deploy via deploy.sh; edits belong in the repo, not here).

input_boolean:
  fridge_door_open:
    name: "Kühlschrank Tür offen (erkannt)"
    icon: mdi:fridge-alert

input_number:
  fridge_t0:
    name: "Kühlschrank T0 (vor Öffnung)"
    min: -10
    max: 30
    step: 0.01
    unit_of_measurement: "°C"
    icon: mdi:thermometer-low
    mode: box
  fridge_troom0:
    name: "Kühlschrank Raumtemp bei Öffnung"
    min: 0
    max: 45
    step: 0.01
    unit_of_measurement: "°C"
    icon: mdi:home-thermometer
    mode: box
  fridge_tau:
    name: "Kühlschrank Tau (Kalibrierkonstante)"
    # no initial: — value must survive restarts (recalibration!); seeded once at deploy
    min: 300
    max: 5400
    step: 1
    unit_of_measurement: "s"
    icon: mdi:timer-sand
    mode: box
  fridge_last_open_duration:
    name: "Kühlschrank letzte Öffnungsdauer"
    min: 0
    max: 86400
    step: 1
    unit_of_measurement: "s"
    icon: mdi:timer-outline
    mode: box
  fridge_open_seconds_total:
    name: "Kühlschrank Öffnungssekunden gesamt"
    min: 0
    max: 100000000
    step: 1
    unit_of_measurement: "s"
    icon: mdi:sigma
    mode: box

input_datetime:
  fridge_opened_at:
    name: "Kühlschrank geöffnet um"
    has_date: true
    has_time: true
    icon: mdi:clock-start

input_text:
  fridge_last_event_class:
    name: "Kühlschrank letzte Ereignisklasse"
    icon: mdi:tag-outline

counter:
  fridge_openings_total:
    name: "Kühlschrank Öffnungen gesamt"
    icon: mdi:counter
    restore: true

# Mirror sensors: expose helper values as proper sensors so that recorder LTS,
# the statistics platform and utility_meter can consume them.
# (YAML templates by design here: this package is git-managed — UI Template
# Helpers would not be version-controlled.)
template:
  - sensor:
      - name: "Kühlschrank Tür letzte Öffnungsdauer"
        unique_id: fridge_door_last_open_duration
        unit_of_measurement: "s"
        device_class: duration
        state_class: measurement
        icon: mdi:door-open
        # Event-gated: only available for ~1 h after an opening, so long-term
        # statistics average EVENT durations - a permanently held value would
        # pollute every event-free hour with a stale mean.
        availability: >-
          {{ has_value('input_number.fridge_last_open_duration')
             and states('input_number.fridge_last_open_duration') | float(0) > 0
             and has_value('input_datetime.fridge_opened_at')
             and (now().timestamp() - state_attr('input_datetime.fridge_opened_at', 'timestamp') | float(0)) < 3600 }}
        state: "{{ states('input_number.fridge_last_open_duration') | float(0) | round(0) }}"
      - name: "Kühlschrank Tür Öffnungen gesamt"
        unique_id: fridge_door_openings_total
        state_class: total_increasing
        icon: mdi:counter
        availability: "{{ has_value('counter.fridge_openings_total') }}"
        state: "{{ states('counter.fridge_openings_total') | int(0) }}"
      - name: "Kühlschrank Tür Öffnungszeit gesamt"
        unique_id: fridge_door_open_seconds_total
        unit_of_measurement: "s"
        device_class: duration
        state_class: total_increasing
        icon: mdi:sigma
        availability: "{{ has_value('input_number.fridge_open_seconds_total') }}"
        state: "{{ states('input_number.fridge_open_seconds_total') | float(0) | round(0) }}"
      # Readable duration displays: string states ("42 s" / "26 min" / "9,9 h")
      # for dashboard rows - display-only, no unit/state_class.
      - name: "Kühlschrank Öffnungszeit heute lesbar"
        unique_id: fridge_open_time_today_readable
        icon: mdi:clock-outline
        availability: "{{ has_value('sensor.kuhlschrank_offnungszeit_heute') }}"
        state: >-
          {% set s = states('sensor.kuhlschrank_offnungszeit_heute') | float(0) %}
          {% if s < 60 %}{{ s | round(0) | int }} s
          {%- elif s < 3600 %}{{ (s / 60) | round(0) | int }} min
          {%- else %}{{ ((s / 3600) | round(1)) | string | replace('.', ',') }} h{% endif %}
      - name: "Kühlschrank Öffnungszeit Monat lesbar"
        unique_id: fridge_open_time_month_readable
        icon: mdi:clock-outline
        availability: "{{ has_value('sensor.kuhlschrank_offnungszeit_monat') }}"
        state: >-
          {% set s = states('sensor.kuhlschrank_offnungszeit_monat') | float(0) %}
          {% if s < 60 %}{{ s | round(0) | int }} s
          {%- elif s < 3600 %}{{ (s / 60) | round(0) | int }} min
          {%- else %}{{ ((s / 3600) | round(1)) | string | replace('.', ',') }} h{% endif %}
      - name: "Kühlschrank Öffnungszeit gesamt lesbar"
        unique_id: fridge_open_time_total_readable
        icon: mdi:sigma
        availability: "{{ has_value('input_number.fridge_open_seconds_total') }}"
        state: >-
          {% set s = states('input_number.fridge_open_seconds_total') | float(0) %}
          {% if s < 60 %}{{ s | round(0) | int }} s
          {%- elif s < 3600 %}{{ (s / 60) | round(0) | int }} min
          {%- else %}{{ ((s / 3600) | round(1)) | string | replace('.', ',') }} h{% endif %}
      - name: "Kühlschrank letzte Öffnungsdauer lesbar"
        unique_id: fridge_last_duration_readable
        icon: mdi:door-open
        availability: "{{ has_value('input_number.fridge_last_open_duration') }}"
        state: >-
          {% set s = states('input_number.fridge_last_open_duration') | float(0) %}
          {% if s < 60 %}{{ s | round(0) | int }} s
          {%- elif s < 3600 %}{{ (s / 60) | round(0) | int }} min
          {%- else %}{{ ((s / 3600) | round(1)) | string | replace('.', ',') }} h{% endif %}
      - name: "Kühlschrank Öffnungsdauer Median 7d lesbar"
        unique_id: fridge_duration_median_7d_readable
        icon: mdi:calculator-variant-outline
        availability: "{{ has_value('sensor.kuhlschrank_offnungsdauer_median_7d') }}"
        state: >-
          {% set s = states('sensor.kuhlschrank_offnungsdauer_median_7d') | float(0) %}
          {% if s < 60 %}{{ s | round(0) | int }} s
          {%- elif s < 3600 %}{{ (s / 60) | round(0) | int }} min
          {%- else %}{{ ((s / 3600) | round(1)) | string | replace('.', ',') }} h{% endif %}
      - name: "Kühlschrank Öffnungsdauer Max 7d lesbar"
        unique_id: fridge_duration_max_7d_readable
        icon: mdi:calculator-variant
        availability: "{{ has_value('sensor.kuhlschrank_offnungsdauer_max_7d') }}"
        state: >-
          {% set s = states('sensor.kuhlschrank_offnungsdauer_max_7d') | float(0) %}
          {% if s < 60 %}{{ s | round(0) | int }} s
          {%- elif s < 3600 %}{{ (s / 60) | round(0) | int }} min
          {%- else %}{{ ((s / 3600) | round(1)) | string | replace('.', ',') }} h{% endif %}
      - name: "Kühlschrank Türstatus"
        unique_id: fridge_door_state
        icon: >-
          {{ 'mdi:fridge-alert' if is_state('input_boolean.fridge_door_open', 'on')
             else 'mdi:fridge' }}
        state: >-
          {% if is_state('input_boolean.fridge_door_open', 'on') %}offen
          {%- else %}geschlossen{% endif %}
        attributes:
          letzte_klasse: "{{ states('input_text.fridge_last_event_class') }}"
          letzte_dauer_s: "{{ states('input_number.fridge_last_open_duration') }}"
          geoeffnet_um: "{{ states('input_datetime.fridge_opened_at') }}"

sensor:
  - platform: statistics
    name: "Kühlschrank Öffnungsdauer Median 7d"
    unique_id: fridge_open_duration_median_7d
    entity_id: sensor.kuhlschrank_tur_letzte_offnungsdauer
    state_characteristic: median
    sampling_size: 500
    max_age:
      days: 7
  - platform: statistics
    name: "Kühlschrank Öffnungsdauer Max 7d"
    unique_id: fridge_open_duration_max_7d
    entity_id: sensor.kuhlschrank_tur_letzte_offnungsdauer
    state_characteristic: value_max
    sampling_size: 500
    max_age:
      days: 7

utility_meter:
  fridge_openings_daily:
    name: "Kühlschrank Öffnungen heute"
    source: sensor.kuhlschrank_tur_offnungen_gesamt
    cycle: daily
  fridge_openings_weekly:
    name: "Kühlschrank Öffnungen Woche"
    source: sensor.kuhlschrank_tur_offnungen_gesamt
    cycle: weekly
  fridge_openings_monthly:
    name: "Kühlschrank Öffnungen Monat"
    source: sensor.kuhlschrank_tur_offnungen_gesamt
    cycle: monthly
  fridge_open_time_daily:
    name: "Kühlschrank Öffnungszeit heute"
    source: sensor.kuhlschrank_tur_offnungszeit_gesamt
    cycle: daily
  fridge_open_time_monthly:
    name: "Kühlschrank Öffnungszeit Monat"
    source: sensor.kuhlschrank_tur_offnungszeit_gesamt
    cycle: monthly
