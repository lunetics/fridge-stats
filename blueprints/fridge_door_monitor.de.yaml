blueprint:
  name: Kühlschrank-Tür-Monitor (temperaturphysik-basiert)
  description: >
    Erkennt Kühlschrank-Türöffnungen OHNE Türkontaktsensor, allein aus dem
    Innentemperatur-Signal: eine Türöffnung erwärmt den Innenraum in Richtung
    Raumtemperatur schneller als der Kompressorzyklus (am Referenz-Kühlschrank
    >=0,10 vs <=0,06 °C/min — gemessene Werte, keine Naturkonstanten; passe
    rise_rate_min an dein Gerät an, siehe Doku). Ein zweiter, Umgebungs-
    Temperatursensor ist PFLICHT-Input: er liefert die Raumtemperatur-Antriebskraft
    für die Dauerschätzung t_open = -tau * ln(1 - dT_peak / (T_room - T0)).
    Feuert fridge_door_opened / fridge_door_closed / fridge_door_ajar Events,
    schreibt Logbuch-Einträge, pflegt Zähler/Dauern in Helfern (siehe das
    fridge-stats-Package, das passende Helfer als Defaults mitbringt) und führt
    nutzerdefinierte Alarm-Aktionen für Tür-angelehnt und Übertemperatur aus.
    Pro Gerät instanziierbar (Kühlschrank, Gefrierschrank, ...) mit eigenem
    Helfer-Satz.
  domain: automation
  author: lunetics
  source_url: https://github.com/lunetics/fridge-stats/blob/main/blueprints/fridge_door_monitor.de.yaml
  homeassistant:
    min_version: "2026.6.0"  # per-step note: annotations require 2026.6
  input:
    sensors:
      name: Sensoren
      icon: mdi:thermometer
      input:
        fridge_temp_sensor:
          name: Kühlschrank-Temperatursensor
          description: Temperatursensor IM Kühlschrank.
          selector:
            entity:
              domain: sensor
              device_class: temperature
        ambient_temp_sensor:
          name: Umgebungs-Temperatursensor
          description: >
            Raumtemperatur-Referenz (thermische Antriebskraft). Ein Sensor in oder
            nahe der Küche; jeder Raumsensor auf derselben Etage funktioniert.
          selector:
            entity:
              domain: sensor
              device_class: temperature
        aux_open_sensor:
          name: Zusätzlicher Türsensor (optional, künftiges Feature)
          description: >
            Optionaler Bewegungs-/Vibrations-/Kontakt-binary_sensor an der
            Kühlschranktür für präzise Öffnungs-/Schließ-Zeitstempel. v1 loggt
            seine Events neben der thermischen Erkennung (Sensor-Fusion ist
            geplant); leer lassen, falls nicht vorhanden.
          default: []
          selector:
            entity:
              domain: binary_sensor
    state_helpers:
      name: Zustands-Helfer (Defaults = fridge-stats-Package)
      icon: mdi:database
      collapsed: true
      input:
        helper_door_open:
          name: Türzustand-Boolean
          default: input_boolean.fridge_door_open
          selector:
            entity:
              domain: input_boolean
        helper_t0:
          name: T0-Snapshot-Helfer
          default: input_number.fridge_t0
          selector:
            entity:
              domain: input_number
        helper_troom0:
          name: Raumtemp-Snapshot-Helfer
          default: input_number.fridge_troom0
          selector:
            entity:
              domain: input_number
        helper_tau:
          name: Tau-Kalibrierkonstante-Helfer (Sekunden)
          default: input_number.fridge_tau
          selector:
            entity:
              domain: input_number
        helper_opened_at:
          name: Öffnungszeitpunkt-Helfer
          default: input_datetime.fridge_opened_at
          selector:
            entity:
              domain: input_datetime
        helper_last_duration:
          name: Letzte-Öffnungsdauer-Helfer (Sekunden)
          default: input_number.fridge_last_open_duration
          selector:
            entity:
              domain: input_number
        helper_last_class:
          name: Letzte-Ereignisklasse-Helfer
          default: input_text.fridge_last_event_class
          selector:
            entity:
              domain: input_text
        counter_openings:
          name: Öffnungs-Zähler
          default: counter.fridge_openings_total
          selector:
            entity:
              domain: counter
        helper_open_seconds_total:
          name: Kumulierte-Öffnungssekunden-Helfer
          default: input_number.fridge_open_seconds_total
          selector:
            entity:
              domain: input_number
    thresholds:
      name: Erkennungs-Schwellen
      icon: mdi:tune
      collapsed: true
      input:
        rise_rate_min:
          name: Minimale Anstiegsrate (°C/min)
          description: >
            Referenz-Kühlschrank-Werte: Türöffnungen stiegen mit >=0,3 °C/min, die
            Kompressor-Flanke blieb <=0,06 °C/min, also liegt 0,10 mit Reserve
            dazwischen. GEMESSEN an einem Kühlschrank, nicht universell — ein
            schnellerer Kompressor braucht einen höheren Wert. Kalibriere deinen:
            analysis/calibrate_tau.py --rate-check.
          default: 0.10
          selector:
            number: {min: 0.02, max: 0.5, step: 0.01, unit_of_measurement: "°C/min"}
        rise_amp_min:
          name: Minimale Ausschlags-Amplitude (°C)
          description: Gesamtanstieg darunter wird als Störspitze verworfen (nicht gezählt).
          default: 0.30
          selector:
            number: {min: 0.1, max: 1.0, step: 0.05, unit_of_measurement: "°C"}
        fall_confirm:
          name: Abfall-Bestätigung (°C)
          description: Ein Messwert so weit unter dem vorherigen schließt das Ereignis.
          default: 0.05
          selector:
            number: {min: 0.02, max: 0.5, step: 0.01, unit_of_measurement: "°C"}
        ajar_minutes:
          name: Tür-angelehnt-Warnung nach (Minuten)
          default: 15
          selector:
            number: {min: 5, max: 120, step: 1, unit_of_measurement: min}
        ajar_warn_temp:
          name: Mindesttemperatur für Tür-angelehnt-Warnung (°C)
          description: >
            Die Tür-angelehnt-Warnung feuert erst, wenn der Innenraum diese
            Temperatur wirklich erreicht hat; ein langer "Offen"-Zustand, dessen
            Spitze sie nie überschreitet, wird als Kompressor-Aus-Drift (Phantom)
            verworfen und nicht gezählt. Das verwirft den Fehlerfall, bei dem die
            passive Kompressor-Aus-Erwärmungsrampe als angelehnte Tür fehlgedeutet
            wird (langsamer Anstieg in die normale Zyklus-Obergrenze, keine echte
            Öffnung). Setze sie knapp über die normale Kompressor-Zyklus-Spitze
            deines Kühlschranks; der Default 8 °C ist die EU-Obergrenze für
            gekühlte Ware und liegt unter critical_temp.
          default: 8
          selector:
            number: {min: 4, max: 15, step: 0.5, unit_of_measurement: "°C"}
        critical_temp:
          name: Kritische Kühlschranktemperatur (°C)
          description: >
            Innentemperatur, die für 30 min gehalten den Kritisch-Alarm auslöst.
            Default 10 °C = über der EU-Rechtsobergrenze für gekühlte Ware (8 °C)
            mit Karenzfenster, damit normale Einräum-Transienten nicht auslösen.
          default: 10
          selector:
            number: {min: 6, max: 20, step: 0.5, unit_of_measurement: "°C"}
        stale_hours:
          name: Veralteter-Zustand-Schutz (Stunden)
          description: >
            Trifft der Schließ-Messwert mehr als so viele Stunden nach der
            erfassten Öffnung ein (z. B. Automation mitten im Ereignis pausiert
            oder Sensor weg), wird das veraltete Ereignis verworfen statt eine
            absurde Dauer zu buchen. Echte Tür-angelehnt-Fälle bleiben klar darunter.
          default: 6
          selector:
            number: {min: 1, max: 48, step: 1, unit_of_measurement: h}
    alarms:
      name: Alarm-Aktionen
      icon: mdi:alarm-light
      input:
        warn_actions:
          name: Tür-angelehnt-Warnaktionen
          description: Läuft, wenn die Tür für die Warnzeit offen/angelehnt scheint.
          default: []
          selector:
            action: {}
        critical_actions:
          name: Kritische-Übertemperatur-Aktionen
          description: Läuft, wenn der Kühlschrank über der kritischen Temperatur bleibt.
          default: []
          selector:
            action: {}

mode: queued
max: 25
max_exceeded: silent

variables:
  fridge_sensor: !input fridge_temp_sensor
  ambient_sensor: !input ambient_temp_sensor
  helper_open_seconds: !input helper_open_seconds_total
  helper_t0: !input helper_t0
  helper_troom0: !input helper_troom0
  helper_tau: !input helper_tau
  helper_opened_at: !input helper_opened_at
  door_helper: !input helper_door_open
  rise_rate_min: !input rise_rate_min
  rise_amp_min: !input rise_amp_min
  fall_confirm: !input fall_confirm
  stale_hours: !input stale_hours
  ajar_minutes: !input ajar_minutes
  ajar_warn_temp: !input ajar_warn_temp

triggers:
  - trigger: state
    entity_id: !input fridge_temp_sensor
    id: temp_report
  - trigger: state
    entity_id: !input helper_door_open
    to: "on"
    for:
      minutes: !input ajar_minutes
    id: ajar_time
  - trigger: numeric_state
    entity_id: !input fridge_temp_sensor
    above: !input critical_temp
    for: "00:30:00"
    id: critical_temp
  - trigger: state
    entity_id: !input aux_open_sensor
    to: "on"
    id: aux_open

actions:
  - choose:
      # ---- door OPENED: fast temperature rise while considered closed ----
      - conditions:
          - condition: trigger
            id: temp_report
          - condition: state
            entity_id: !input helper_door_open
            state: "off"
          - >-
            {{ trigger.from_state is not none
               and trigger.to_state.state not in ['unknown', 'unavailable']
               and trigger.from_state.state not in ['unknown', 'unavailable'] }}
          - >-
            {% set dv = trigger.to_state.state | float(0) - trigger.from_state.state | float(0) %}
            {% set dt = [(trigger.to_state.last_updated - trigger.from_state.last_updated).total_seconds(), 1] | max %}
            {{ dv >= 0.15 and (dv / dt * 60) >= rise_rate_min | float(0.1) }}
        sequence:
          - action: input_number.set_value
            target:
              entity_id: !input helper_t0
            data:
              value: "{{ trigger.from_state.state | float(5) }}"
            note: "T0 = value BEFORE the rise segment — the true pre-opening baseline."
          - action: input_number.set_value
            target:
              entity_id: !input helper_troom0
            data:
              value: "{{ states(ambient_sensor) | float(21) }}"
          - action: input_datetime.set_datetime
            target:
              entity_id: !input helper_opened_at
            data:
              datetime: "{{ as_local(trigger.from_state.last_updated).strftime('%Y-%m-%d %H:%M:%S') }}"
            note: "Opening happened between the two reports; the pre-rise report time is the closest bound."
          - action: input_boolean.turn_on
            target:
              entity_id: !input helper_door_open
          - event: fridge_door_opened
            event_data:
              t0: "{{ trigger.from_state.state | float(0) }}"
              t_room: "{{ states(ambient_sensor) | float(0) }}"
              opened_at: "{{ as_local(trigger.from_state.last_updated).isoformat() }}"
              source: temperature
          - action: logbook.log
            data:
              name: Kühlschrank
              message: >-
                Tür geöffnet (Anstieg {{ (trigger.to_state.state | float(0) -
                trigger.from_state.state | float(0)) | round(2) }} K erkannt)
              entity_id: "{{ door_helper }}"

      # ---- door CLOSED: temperature falls again while considered open ----
      - conditions:
          - condition: trigger
            id: temp_report
          - condition: state
            entity_id: !input helper_door_open
            state: "on"
          - >-
            {{ trigger.from_state is not none
               and trigger.to_state.state not in ['unknown', 'unavailable']
               and trigger.from_state.state not in ['unknown', 'unavailable'] }}
          - >-
            {{ trigger.to_state.state | float(0)
               < trigger.from_state.state | float(0) - fall_confirm | float(0.05) }}
        sequence:
          - variables:
              t0: "{{ states(helper_t0) | float(5) }}"
              troom: "{{ states(helper_troom0) | float(21) }}"
              peak: "{{ trigger.from_state.state | float(5) }}"
              d_t: "{{ (peak | float(5)) - (t0 | float(5)) }}"
              drive: "{{ (troom | float(21)) - (t0 | float(5)) }}"
              opened_ts: "{{ state_attr(helper_opened_at, 'timestamp') }}"
              wall_s: >-
                {{ (now().timestamp() - opened_ts | float(0)) | round(0)
                   if opened_ts not in [none, 'None'] else 0 }}
              tau: "{{ states(helper_tau) | float(1028) }}"
              ratio: >-
                {{ (d_t | float(0)) / (drive | float(20))
                   if drive | float(0) > 2 else 0 }}
              sustained: "{{ wall_s | float(0) >= (ajar_minutes | float(15)) * 60 or d_t | float(0) >= 2.5 }}"
              duration: >-
                {% if sustained %}{{ wall_s | float(0) | round(0) }}
                {%- elif 0 < ratio | float(0) < 0.95 -%}
                {{ (- (tau | float(1028)) * log(1 - ratio | float(0))) | round(0) }}
                {%- else %}0{% endif %}
              door_class: >-
                {% if sustained %}sustained_warmup
                {%- elif duration | float(0) < 40 %}quick_grab
                {%- elif duration | float(0) <= 90 %}normal_grab
                {%- else %}extended_open{% endif %}
          - action: input_boolean.turn_off
            target:
              entity_id: !input helper_door_open
          - if:
              - "{{ d_t | float(0) < rise_amp_min | float(0.3) }}"
            then:
              - action: input_text.set_value
                target:
                  entity_id: !input helper_last_class
                data:
                  value: blip
              - stop: "excursion below amplitude threshold — not counted"
            note: "Blips (noise-scale rises) end the open state but are not logged as openings."
          - if:
              - "{{ wall_s | float(0) > (stale_hours | float(6)) * 3600 }}"
            then:
              - action: input_text.set_value
                target:
                  entity_id: !input helper_last_class
                data:
                  value: stale_reset
              - action: logbook.log
                data:
                  name: Kühlschrank
                  message: >-
                    Veralteter Offen-Zustand verworfen (Öffnung angeblich seit
                    {{ states(helper_opened_at) }} — Automation zwischenzeitlich pausiert?)
                  entity_id: "{{ door_helper }}"
              - stop: "stale open state discarded — not counted"
            note: "Self-heal: a pause while 'open' must not book a days-long duration."
          - if:
              - >-
                {{ wall_s | float(0) >= (ajar_minutes | float(15)) * 60
                   and peak | float(0) < ajar_warn_temp | float(8) }}
            then:
              - action: input_text.set_value
                target:
                  entity_id: !input helper_last_class
                data:
                  value: compressor_cycle
              - action: logbook.log
                data:
                  name: Kühlschrank
                  message: >-
                    Langer "Offen"-Zustand als Kompressor-Aus-Drift verworfen — Innenraum erreichte nur
                    {{ peak | float(0) | round(2) }} °C über {{ (wall_s | float(0) / 60) | round(0) }} min,
                    nie über {{ ajar_warn_temp | float(8) }} °C (keine echte Öffnung)
                  entity_id: "{{ door_helper }}"
              - stop: "compressor-cycle phantom — not counted"
            note: "A long 'open' that never warmed past ajar_warn_temp is a compressor off-cycle ramp, not a door."
          - action: input_number.set_value
            target:
              entity_id: !input helper_last_duration
            data:
              value: "{{ duration | float(0) }}"
          - action: input_text.set_value
            target:
              entity_id: !input helper_last_class
            data:
              value: "{{ door_class }}"
          - action: counter.increment
            target:
              entity_id: !input counter_openings
          - action: input_number.set_value
            target:
              entity_id: !input helper_open_seconds_total
            data:
              value: "{{ states(helper_open_seconds) | float(0) + duration | float(0) }}"
          - event: fridge_door_closed
            event_data:
              duration_s: "{{ duration | float(0) }}"
              class: "{{ door_class }}"
              dt_peak: "{{ d_t | float(0) | round(2) }}"
              t0: "{{ t0 | float(0) | round(2) }}"
              peak: "{{ peak | float(0) | round(2) }}"
              t_room: "{{ troom | float(0) | round(1) }}"
              wall_clock_s: "{{ wall_s | float(0) }}"
              source: temperature
          - action: logbook.log
            data:
              name: Kühlschrank
              message: >-
                Tür zu — {{ duration | float(0) | round(0) }} s offen
                ({{ door_class }}, ΔT {{ d_t | float(0) | round(2) }} K,
                Raum {{ troom | float(0) | round(1) }} °C)
              entity_id: "{{ door_helper }}"

      # ---- door AJAR warning: still "open" after N minutes AND actually warm ----
      - conditions:
          - condition: trigger
            id: ajar_time
        sequence:
          - if:
              - "{{ states(fridge_sensor) | float(0) >= ajar_warn_temp | float(8) }}"
            then:
              - event: fridge_door_ajar
                event_data:
                  opened_at: "{{ states(helper_opened_at) }}"
                  current_temp: "{{ states(fridge_sensor) }}"
              - action: logbook.log
                data:
                  name: Kühlschrank
                  message: >-
                    ⚠️ Tür offenbar seit {{ states(helper_opened_at) }} offen/angelehnt
                    (Innenraum bei {{ states(fridge_sensor) }} °C)
                  entity_id: "{{ door_helper }}"
              - if:
                  - "{{ true }}"
                then: !input warn_actions
            else:
              - action: logbook.log
                data:
                  name: Kühlschrank
                  message: >-
                    Tür-angelehnt-Warnung unterdrückt — Innenraum nur {{ states(fridge_sensor) }} °C
                    (unter {{ ajar_warn_temp | float(8) }} °C): Kompressorzyklus, keine offene Tür
                  entity_id: "{{ door_helper }}"
            note: >-
              Warmth gate rejects the compressor-off-drift phantom: a door-state that
              has been "on" past the ajar time but whose interior never actually warmed.

      # ---- CRITICAL over-temperature (ajar backstop + appliance failure) ----
      - conditions:
          - condition: trigger
            id: critical_temp
        sequence:
          - event: fridge_temp_critical
            event_data:
              current_temp: "{{ trigger.to_state.state }}"
          - action: logbook.log
            data:
              name: Kühlschrank
              message: >-
                🔴 Innentemperatur kritisch: {{ trigger.to_state.state }} °C
                seit 30 min (Tür offen vergessen oder Gerätedefekt)
              entity_id: "{{ door_helper }}"
          - if:
              - "{{ true }}"
            then: !input critical_actions

      # ---- auxiliary sensor (future sensor-fusion feature): log only ----
      - conditions:
          - condition: trigger
            id: aux_open
        sequence:
          - event: fridge_aux_trigger
            event_data:
              entity_id: "{{ trigger.entity_id }}"
              at: "{{ now().isoformat() }}"
          - action: logbook.log
            data:
              name: Kühlschrank
              message: "Aux-Sensor ausgelöst ({{ trigger.entity_id }})"
              entity_id: "{{ door_helper }}"
